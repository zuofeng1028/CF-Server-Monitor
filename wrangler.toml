# Cloudflare Workers 配置，线上已由deploy.yml接管，这里仅供本地测试
name = "server-monitor-pro"
main = "src/index.js"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# 定时任务配置（UTC）
# - 每小时第 10 分钟：执行数据清理
# - 每分钟：执行离线节点检测
# - 注意同步修改deploy和index.js scheduled函数里面的值
[triggers]
crons = ["10 * * * *", "*/1 * * * *"]

[assets]
directory = "./dist"
binding = "ASSETS"

[vars]
API_SECRET = "admin"
API_USER_NAME = "admin"
LONG_RETENTION = "true"

[[d1_databases]]
binding = "DB"
database_name = "server-monitor-db"
database_id = "local"  # 本地开发时用 "local" 即可

# 开发服务器配置
[dev]
port = 8787
local_protocol = "http"